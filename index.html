<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
    <div class="login-background">
        <!-- Aurora blobs -->
        <div class="aurora aurora-1"></div>
        <div class="aurora aurora-2"></div>
        <div class="aurora aurora-3"></div>

        <!-- Floating geometric shapes - Left side -->
        <div class="geo geo-1"></div>
        <div class="geo geo-2"></div>
        <div class="geo geo-3"></div>
        <div class="geo geo-4"></div>
        <div class="geo geo-5"></div>
        <!-- Left extra -->
        <div class="geo geo-6"></div>
        <div class="geo geo-7"></div>
        <div class="geo geo-8"></div>
        <div class="geo geo-9"></div>
        <div class="geo geo-10"></div>
        <!-- Right side -->
        <div class="geo geo-11"></div>
        <div class="geo geo-12"></div>
        <div class="geo geo-13"></div>
        <div class="geo geo-14"></div>
        <div class="geo geo-15"></div>
        <div class="geo geo-16"></div>
        <div class="geo geo-17"></div>
        <div class="geo geo-18"></div>

        <!-- Grid overlay -->
        <div class="grid-overlay"></div>
    </div>

    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="logo">
                    <svg width="50" height="50" viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="5" y="5" width="40" height="40" rx="6" stroke="#0066cc" stroke-width="2"/>
                        <polyline points="14,30 20,20 26,26 32,16 38,22" stroke="#0066cc" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="14" cy="30" r="2" fill="#0066cc"/>
                        <circle cx="20" cy="20" r="2" fill="#0066cc"/>
                        <circle cx="26" cy="26" r="2" fill="#0066cc"/>
                        <circle cx="32" cy="16" r="2" fill="#0066cc"/>
                        <circle cx="38" cy="22" r="2" fill="#0066cc"/>
                    </svg>
                </div>
                <h1>Monitoring</h1>
                <p class="subtitle">Sistem Manajemen Monitoring Maintenance</p>
            </div>

            <form class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Masukkan username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Masukkan password" required>
                </div>

                <div class="form-group checkbox">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Ingat saya</label>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
